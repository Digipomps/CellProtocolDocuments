server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name digipomps.org;

    root /var/www/haven-public-new;
    index index.html;

    charset utf-8;
    server_tokens off;

    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location = /tjenester/ {
        return 301 /;
    }

    location = /plattform/ {
        return 301 /;
    }

    location = /vanlige-sporsmal/ {
        return 301 /artikler/;
    }

    location = /cellprotocol-explained/ {
        return 301 "/artikler/#hva-er-en-cell";
    }

    location = /purpose-framework-explainer/ {
        return 301 "/artikler/#formal-for-produkt";
    }

    location = /om-oss/ {
        return 301 "/#kontakt";
    }

    location = /en/services/ {
        return 301 /;
    }

    location = /en/cellprotocol-explained/ {
        return 301 "/artikler/#hva-er-en-cell";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|svg|webp|png)$ {
        try_files $uri =404;
        expires 1d;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    ssl_certificate /etc/letsencrypt/live/digipomps.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/digipomps.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.digipomps.org;

    server_tokens off;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    return 301 https://digipomps.org$request_uri;

    ssl_certificate /etc/letsencrypt/live/digipomps.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/digipomps.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name digipomps.org www.digipomps.org;

    server_tokens off;
    return 301 https://digipomps.org$request_uri;
}
