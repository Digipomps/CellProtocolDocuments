<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title description">
  <title id="title">Teknisk tillit som en avgrenset prosess</title>
  <desc id="description">En forespørsel går gjennom synlig formål, avgrenset tillatelse og utført handling før den ender i en kvittering. Tillatelsen kan trekkes tilbake.</desc>
  <rect width="920" height="520" rx="28" fill="#ffffff"/>
  <path d="M88 244H820" stroke="#c8c5bd" stroke-width="6" stroke-linecap="round"/>
  <path d="m800 225 22 19-22 19" fill="none" stroke="#181716" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle">
    <g transform="translate(110 244)">
      <circle r="62" fill="#ebeae5" stroke="#181716" stroke-width="4"/>
      <path d="M-24-20h48v40h-48zM-14-30h28v10h-28" fill="none" stroke="#181716" stroke-width="5" stroke-linejoin="round"/>
      <text y="95" fill="#181716" font-size="22" font-weight="700">Forespørsel</text>
      <text y="123" fill="#5c5954" font-size="17">Hva ønskes?</text>
    </g>
    <g transform="translate(340 244)">
      <circle r="62" fill="#ecdbaa" stroke="#a87518" stroke-width="4"/>
      <path d="M-24 4h48M-18-13h36M-12-30h24" stroke="#181716" stroke-width="5" stroke-linecap="round"/>
      <path d="m-18 22 13 13 27-32" fill="none" stroke="#181716" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="95" fill="#181716" font-size="22" font-weight="700">Formål og valg</text>
      <text y="123" fill="#5c5954" font-size="17">Forstå før du svarer</text>
    </g>
    <g transform="translate(570 244)">
      <circle r="62" fill="#f2ded7" stroke="#b84e37" stroke-width="4"/>
      <path d="M-23-7h46v39h-46zM-12-7v-13a12 12 0 0 1 24 0v13" fill="none" stroke="#181716" stroke-width="5" stroke-linejoin="round"/>
      <text y="95" fill="#181716" font-size="22" font-weight="700">Avgrenset tilgang</text>
      <text y="123" fill="#5c5954" font-size="17">Hvem, hva og hvor lenge</text>
    </g>
    <g transform="translate(800 244)">
      <circle r="62" fill="#ebeae5" stroke="#181716" stroke-width="4"/>
      <path d="M-24-31h48v62h-48z" fill="none" stroke="#181716" stroke-width="5"/>
      <path d="m-13 4 10 10 20-24M-12-15h24" fill="none" stroke="#181716" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="95" fill="#181716" font-size="22" font-weight="700">Kvittering</text>
      <text y="123" fill="#5c5954" font-size="17">Hva skjedde?</text>
    </g>
  </g>
  <path d="M570 390c0 74-230 74-230 4" fill="none" stroke="#b84e37" stroke-width="4" stroke-dasharray="8 10" stroke-linecap="round"/>
  <path d="m326 406 14-14 14 14" fill="none" stroke="#b84e37" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="455" y="480" fill="#84301f" font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Tilgang kan utløpe eller trekkes tilbake</text>
</svg>
