<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title description">
  <title id="title">Mulig modell for etterprøvbar verdifordeling</title>
  <desc id="description">Et dokumentert bidrag går gjennom en synlig og simulerbar fordelingsregel før verdi kan gå til individ, fellesskap og drift. Figuren viser en forskningsretning, ikke en ferdig mekanisme.</desc>
  <rect width="920" height="560" rx="28" fill="#ffffff"/>
  <g font-family="system-ui, sans-serif">
    <text x="56" y="60" fill="#b84e37" font-size="16" font-weight="800" letter-spacing="2">MULIG MODELL · IKKE FERDIG MEKANISME</text>
    <rect x="56" y="102" width="220" height="190" rx="26" fill="#ebeae5" stroke="#181716" stroke-width="3"/>
    <text x="86" y="150" fill="#181716" font-size="17" font-weight="800">1 · GRUNNLAG</text>
    <text x="86" y="194" fill="#181716" font-size="25" font-weight="700">Dokumentert</text>
    <text x="86" y="227" fill="#181716" font-size="25" font-weight="700">bidrag</text>
    <text x="86" y="264" fill="#5c5954" font-size="17">kontrakt + bevis</text>
    <path d="M296 196h72" stroke="#181716" stroke-width="6" stroke-linecap="round"/>
    <path d="m350 179 20 17-20 17" fill="none" stroke="#181716" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="388" y="102" width="220" height="190" rx="26" fill="#f7efd9" stroke="#a87518" stroke-width="3"/>
    <text x="418" y="150" fill="#6f4b00" font-size="17" font-weight="800">2 · REGEL</text>
    <text x="418" y="194" fill="#181716" font-size="25" font-weight="700">Åpen og</text>
    <text x="418" y="227" fill="#181716" font-size="25" font-weight="700">simulerbar</text>
    <text x="418" y="264" fill="#5c5954" font-size="17">kan kritiseres</text>
    <path d="M628 196h72" stroke="#181716" stroke-width="6" stroke-linecap="round"/>
    <path d="m682 179 20 17-20 17" fill="none" stroke="#181716" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="720" y="84" width="144" height="74" rx="20" fill="#ebeae5" stroke="#181716" stroke-width="3"/>
    <text x="792" y="128" fill="#181716" font-size="20" font-weight="700" text-anchor="middle">Individ</text>
    <rect x="720" y="170" width="144" height="74" rx="20" fill="#f2ded7" stroke="#b84e37" stroke-width="3"/>
    <text x="792" y="214" fill="#181716" font-size="20" font-weight="700" text-anchor="middle">Fellesskap</text>
    <rect x="720" y="256" width="144" height="74" rx="20" fill="#f7efd9" stroke="#a87518" stroke-width="3"/>
    <text x="792" y="300" fill="#181716" font-size="20" font-weight="700" text-anchor="middle">Drift</text>
    <rect x="56" y="370" width="808" height="126" rx="26" fill="#f2ded7"/>
    <text x="86" y="414" fill="#84301f" font-size="17" font-weight="800">SPØRSMÅL SOM MÅ BESVARES FØR EN PILOT</text>
    <text x="86" y="452" fill="#181716" font-size="19">Hvem definerer bidrag? Hvem kan klage? Hva kan manipuleres?</text>
    <text x="86" y="481" fill="#181716" font-size="19">Hvilken juridisk klassifisering får verdien?</text>
  </g>
</svg>
