<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title description">
  <title id="title">Kontekstuell tillit uten global poengsum</title>
  <desc id="description">Tre like store personer er knyttet til konkrete erfaringer i tre forskjellige sammenhenger. En erfaring gjelder bare i sin sammenheng og blir ikke til en samlet personscore.</desc>
  <rect width="920" height="560" rx="28" fill="#ffffff"/>
  <g font-family="system-ui, sans-serif">
    <rect x="62" y="58" width="796" height="120" rx="24" fill="#ebeae5" stroke="#181716" stroke-width="3"/>
    <text x="92" y="98" fill="#181716" font-size="16" font-weight="800" letter-spacing="2">BORETTSLAGET</text>
    <text x="92" y="140" fill="#181716" font-size="24" font-weight="700">«Har samarbeidet om å reparere fellesrommet»</text>
    <text x="742" y="140" fill="#5c5954" font-size="18" text-anchor="end">kilde + dato</text>
    <rect x="62" y="220" width="796" height="120" rx="24" fill="#f7efd9" stroke="#a87518" stroke-width="3"/>
    <text x="92" y="260" fill="#6f4b00" font-size="16" font-weight="800" letter-spacing="2">VERKSTEDET</text>
    <text x="92" y="302" fill="#181716" font-size="24" font-weight="700">«Kan bekrefte dette konkrete bidraget»</text>
    <text x="742" y="302" fill="#5c5954" font-size="18" text-anchor="end">omfang + utløp</text>
    <rect x="62" y="382" width="796" height="120" rx="24" fill="#f2ded7" stroke="#b84e37" stroke-width="3"/>
    <text x="92" y="422" fill="#84301f" font-size="16" font-weight="800" letter-spacing="2">NY SAMMENHENG</text>
    <text x="92" y="464" fill="#181716" font-size="24" font-weight="700">«Her har vi ikke nok grunnlag ennå»</text>
    <text x="742" y="464" fill="#5c5954" font-size="18" text-anchor="end">ukjent ≠ upålitelig</text>
  </g>
  <g transform="translate(787 98)" fill="#ffffff" stroke="#181716" stroke-width="4">
    <circle r="24"/>
    <path d="M-36 55c4-28 68-28 72 0" fill="none"/>
  </g>
  <g transform="translate(787 260)" fill="#ffffff" stroke="#181716" stroke-width="4">
    <circle r="24"/>
    <path d="M-36 55c4-28 68-28 72 0" fill="none"/>
  </g>
  <g transform="translate(787 422)" fill="#ffffff" stroke="#181716" stroke-width="4">
    <circle r="24"/>
    <path d="M-36 55c4-28 68-28 72 0" fill="none"/>
  </g>
</svg>
