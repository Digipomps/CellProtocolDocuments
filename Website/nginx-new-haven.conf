server {
    server_name new.haven.digipomps.org;

    root /var/www/haven-public-new;
    index index.html;

    charset utf-8;
    server_tokens off;

    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|svg|webp)$ {
        try_files $uri =404;
        expires 1d;
    }

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/new.haven.digipomps.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/new.haven.digipomps.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = new.haven.digipomps.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name new.haven.digipomps.org;
    return 404; # managed by Certbot
}
